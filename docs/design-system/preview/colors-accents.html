<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--cream-bg);font-family:var(--sans);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.swatch{aspect-ratio:1.2/1;border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-soft);}
.hex{font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;}
.name{font-family:var(--serif);font-size:14px;line-height:1.1;}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#97634b;color:#fff;"><div class="name">Chandan Soil<br><span style="font-family:var(--sans);font-size:9px;font-weight:500;opacity:.7;text-transform:uppercase;letter-spacing:.5px;">Primary CTA</span></div><div class="hex">#97634B</div></div>
  <div class="swatch" style="background:#864E3A;color:#FEF9E7;"><div class="name">Rust<br><span style="font-family:var(--sans);font-size:9px;font-weight:500;opacity:.7;text-transform:uppercase;letter-spacing:.5px;">Accent</span></div><div class="hex">#864E3A</div></div>
  <div class="swatch" style="background:#FBBF24;color:#191D18;"><div class="name">Amber<br><span style="font-family:var(--sans);font-size:9px;font-weight:500;opacity:.7;text-transform:uppercase;letter-spacing:.5px;">Ratings</span></div><div class="hex">#FBBF24</div></div>
  <div class="swatch" style="background:#82351d;color:#FEF9E7;"><div class="name">Burnt Nectar<br><span style="font-family:var(--sans);font-size:9px;font-weight:500;opacity:.7;text-transform:uppercase;letter-spacing:.5px;">Eyebrow</span></div><div class="hex">#82351D</div></div>
</div>
</body></html>
