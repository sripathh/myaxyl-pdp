<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#F9F8F3;font-family:var(--sans);}
.card{background:#fff;border:1px solid rgba(192,200,195,0.25);border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.05);overflow:hidden;max-width:260px;}
.img{height:160px;background-size:cover;background-position:center;}
.body{padding:20px;text-align:center;}
.role{display:inline-flex;background:rgba(34,197,94,0.2);color:#16a34a;padding:3px 8px;font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;border-radius:4px;margin-bottom:10px;}
.name{font-family:var(--serif);font-size:26px;color:#1E4B3C;line-height:1.15;margin:0 0 6px;}
.latin{font-family:var(--serif);font-style:italic;font-size:13px;color:rgba(25,29,24,0.6);margin-bottom:10px;}
.desc{font-size:12px;color:rgba(25,29,24,0.7);line-height:1.5;}
</style></head>
<body>
<div class="card">
  <div class="img" style="background-image:url('../assets/ing-bhringaraj.webp');"></div>
  <div class="body">
    <div class="role">Growth</div>
    <div class="name">Bhringaraja</div>
    <div class="latin">Eclipta alba</div>
    <div class="desc">Activates follicles and increases scalp circulation.</div>
  </div>
</div>
</body></html>
