<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:28px;background:#fff;font-family:var(--sans);}
.acc{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.05);overflow:hidden;max-width:520px;border:1px solid rgba(192,200,195,0.25);}
.item{border-bottom:1px solid rgba(192,200,195,0.25);}
.item:last-child{border:none;}
.trig{display:flex;align-items:center;justify-content:space-between;width:100%;padding:20px 24px;background:none;font-family:var(--serif);font-size:18px;color:#1E4B3C;text-align:left;}
.chev{width:10px;height:10px;transition:transform .25s ease;}
.open .chev{transform:rotate(90deg);}
.panel{padding:0 24px 24px;color:rgba(25,29,24,0.7);font-size:15px;line-height:1.6;}
</style></head>
<body>
<div class="acc">
  <div class="item open">
    <div class="trig"><span>Preparation method</span><img class="chev" src="../assets/chevron.svg"></div>
    <div class="panel">Herbs are first made into a kashaya (decoction), then combined with the sesame oil base and kalka (paste). The 11-day classical extraction binds the herbal essence to the oil.</div>
  </div>
  <div class="item"><div class="trig"><span>Safety &amp; side effects</span><img class="chev" src="../assets/chevron.svg"></div></div>
  <div class="item"><div class="trig"><span>Full ingredient list</span><img class="chev" src="../assets/chevron.svg"></div></div>
</div>
</body></html>
