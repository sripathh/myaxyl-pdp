<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--cream-bg);font-family:var(--sans);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.swatch{aspect-ratio:1.2/1;border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-soft);}
.hex{font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;}
.name{font-family:var(--serif);font-size:14px;line-height:1.1;}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#FDFCF8;color:#191D18;"><div class="name">Cream BG</div><div class="hex">#FDFCF8</div></div>
  <div class="swatch" style="background:#F9F8F3;color:#191D18;"><div class="name">Cream</div><div class="hex">#F9F8F3</div></div>
  <div class="swatch" style="background:#FFFFFF;color:#191D18;"><div class="name">White</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch" style="background:#FEF9E7;color:#793A24;"><div class="name">Off Yellow</div><div class="hex">#FEF9E7</div></div>
</div>
</body></html>
