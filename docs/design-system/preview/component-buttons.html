<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:28px;background:#F9F8F3;font-family:var(--sans);display:flex;flex-direction:column;gap:16px;}
.atc{display:flex;align-items:center;background:#864E3A;color:#fff;border-radius:10px;padding:14px 18px;gap:12px;box-shadow:0 2px 8px rgba(134,78,58,0.25);max-width:440px;}
.atc__icon{width:36px;height:36px;background:rgba(255,255,255,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.atc__icon img{width:22px;height:22px;filter:brightness(0) invert(1);}
.atc__main{flex:1;}
.atc__top{font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase;line-height:1.1;}
.atc__sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px;}
.atc__price{display:flex;flex-direction:column;align-items:flex-end;padding-left:12px;border-left:1px solid rgba(255,255,255,0.2);line-height:1;}
.atc__old{font-size:12px;font-weight:800;text-decoration:line-through;opacity:.5;margin-bottom:2px;}
.atc__new{font-size:22px;font-weight:900;}
.outline{display:inline-flex;padding:12px 24px;border:2px solid #1E4B3C;color:#1E4B3C;border-radius:999px;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;background:#fff;align-self:flex-start;}
</style></head>
<body>
<div class="atc">
  <div class="atc__icon"><img src="../assets/i-bag.svg"></div>
  <div class="atc__main"><div class="atc__top">Add to Cart</div><div class="atc__sub">2–4 day delivery · free over ₹499</div></div>
  <div class="atc__price"><div class="atc__old">₹350</div><div class="atc__new">₹315</div></div>
</div>
<div class="outline">Read all 86 Reviews</div>
</body></html>
