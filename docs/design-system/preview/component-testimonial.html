<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:28px;background:#1E4B3C;font-family:var(--sans);}
.card{padding-left:24px;border-left:1px solid rgba(254,249,231,0.2);max-width:440px;}
.stars{color:#FBBF24;letter-spacing:2px;font-size:14px;margin-bottom:10px;}
.q{font-family:var(--serif);font-size:22px;color:rgba(254,249,231,0.9);line-height:1.5;margin:0 0 14px;}
.name{font-family:var(--serif);font-size:20px;color:#FEF9E7;line-height:1.15;margin-bottom:4px;}
.meta{font-size:12px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:rgba(254,249,231,0.4);margin-bottom:10px;}
.tag{display:inline-flex;background:#15803D;border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:3px;padding:4px 8px;font-size:11px;font-weight:800;text-transform:uppercase;}
</style></head>
<body>
<div class="card">
  <div class="stars">★★★★★</div>
  <p class="q">Less hair in the shower drain by week three. That was the first sign it was working.</p>
  <div class="name">Priya M.</div>
  <div class="meta">Bengaluru · Week 3</div>
  <span class="tag">↑ Less Fall</span>
</div>
</body></html>
