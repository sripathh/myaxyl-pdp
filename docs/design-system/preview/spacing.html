<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--sans);color:#191D18;}
.row{display:grid;grid-template-columns:60px 1fr;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid rgba(192,200,195,0.25);}
.row:last-child{border:none;}
.tok{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(25,29,24,0.6);}
.bar{height:12px;background:rgba(30,75,60,0.15);border-radius:2px;}
</style></head>
<body>
<div class="row"><div class="tok">4 px</div><div class="bar" style="width:4px;"></div></div>
<div class="row"><div class="tok">8 px</div><div class="bar" style="width:8px;"></div></div>
<div class="row"><div class="tok">12 px</div><div class="bar" style="width:12px;"></div></div>
<div class="row"><div class="tok">16 px</div><div class="bar" style="width:16px;"></div></div>
<div class="row"><div class="tok">24 px</div><div class="bar" style="width:24px;"></div></div>
<div class="row"><div class="tok">32 px</div><div class="bar" style="width:32px;"></div></div>
<div class="row"><div class="tok">48 px</div><div class="bar" style="width:48px;"></div></div>
<div class="row"><div class="tok">64 px</div><div class="bar" style="width:64px;"></div></div>
<div class="row"><div class="tok">96 px</div><div class="bar" style="width:96px;"></div></div>
</body></html>
