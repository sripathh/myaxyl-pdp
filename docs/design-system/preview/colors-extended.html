<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--cream-bg);font-family:var(--sans);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.swatch{aspect-ratio:1.1/1;border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;}
.hex{font-size:10px;font-weight:800;letter-spacing:0.6px;text-transform:uppercase;}
.name{font-family:var(--serif);font-size:13px;line-height:1.1;}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#3d5b43;color:#fff;"><div class="name">Bhoomi Green</div><div class="hex">#3D5B43</div></div>
  <div class="swatch" style="background:#b1ba93;color:#191D18;"><div class="name">Wild Sage</div><div class="hex">#B1BA93</div></div>
  <div class="swatch" style="background:#f9f4ef;color:#191D18;border:1px solid var(--border-soft);"><div class="name">Cotton Bloom</div><div class="hex">#F9F4EF</div></div>
  <div class="swatch" style="background:#2d3669;color:#fff;"><div class="name">Deep River</div><div class="hex">#2D3669</div></div>
  <div class="swatch" style="background:#97634b;color:#fff;"><div class="name">Chandan Soil</div><div class="hex">#97634B</div></div>
  <div class="swatch" style="background:#82351d;color:#fff;"><div class="name">Burnt Nectar</div><div class="hex">#82351D</div></div>
</div>
</body></html>
