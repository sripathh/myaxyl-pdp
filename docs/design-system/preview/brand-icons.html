<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--sans);}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:18px;}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
.icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#F9F8F3;border-radius:8px;border:1px solid rgba(192,200,195,0.25);}
.icon img{width:22px;height:22px;}
.lbl{font-size:9px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:rgba(25,29,24,0.6);}
</style></head>
<body>
<div class="grid">
  <div class="cell"><div class="icon"><img src="../assets/i-bag.svg?v=9"></div><div class="lbl">bag</div></div>
  <div class="cell"><div class="icon"><img src="../assets/i-truck.svg?v=10"></div><div class="lbl">truck</div></div>
  <div class="cell"><div class="icon"><img src="../assets/i-cash.svg?v=9"></div><div class="lbl">cash ₹</div></div>
  <div class="cell"><div class="icon"><img src="../assets/i-return.svg?v=9"></div><div class="lbl">return</div></div>
  <div class="cell"><div class="icon"><img src="../assets/i-check.svg?v=9"></div><div class="lbl">check</div></div>
  <div class="cell"><div class="icon"><img src="../assets/i-x.svg?v=9"></div><div class="lbl">x</div></div>
  <div class="cell"><div class="icon"><img src="../assets/i-info.svg?v=9"></div><div class="lbl">info</div></div>
  <div class="cell"><div class="icon"><img src="../assets/chevron.svg?v=9"></div><div class="lbl">chevron</div></div>
  <div class="cell"><div class="icon"><img src="../assets/ritual.svg?v=9"></div><div class="lbl">ritual · day</div></div>
  <div class="cell"><div class="icon"><img src="../assets/ritual-night.svg?v=9"></div><div class="lbl">ritual · night</div></div>
  <div class="cell"><div class="icon"><img src="../assets/reorder.svg?v=10"></div><div class="lbl">reorder</div></div>
  <div class="cell"><div class="icon"><img src="../assets/star.svg?v=9"></div><div class="lbl">star</div></div>
  <div class="cell"><div class="icon"><img src="../assets/star-half.svg?v=9"></div><div class="lbl">star ½</div></div>
</div>
</body></html>
