/* ============ GALLERY ============ */
function Gallery() {
  const slides = [
    {src:`${DS}/hero-1.webp`, alt:"Myaxyl Pain Relief Oil 200ml bottle — front-facing hero"},
    {src:`${DS}/hero-2.webp`, alt:"Myaxyl Pain Relief Oil 60ml travel size"},
    {src:`${DS}/hero-3.webp`, alt:"Myaxyl Oil being applied to affected area"},
    {src:`${DS}/hero-4.webp`, alt:"Active-use lifestyle context"},
    {src:`${DS}/hero-5.webp`, alt:"Detail shot — texture and pour"},
    {src:`${DS}/hero-6.webp`, alt:"Back label and supplementary context"},
  ];
  const [i, setI] = useState(0);
  const [startX, setStartX] = useState(null);
  const go = (n) => setI((n + slides.length) % slides.length);
  const onStart = (e) => setStartX(e.touches[0].clientX);
  const onEnd = (e) => {
    if (startX == null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) go(i + (dx < 0 ? 1 : -1));
    setStartX(null);
  };
  return (
    <div className="gallery">
      <div className="gallery__stage" onTouchStart={onStart} onTouchEnd={onEnd}>
        <span className="gallery__flag">Best Seller · Pain Relief</span>
        {slides.map(({src, alt}, idx) => (
          <img key={src} src={src} className={"gallery__img" + (i===idx?" is-active":"")} alt={alt}/>
        ))}
        <button className="gallery__arrow gallery__arrow--prev" onClick={()=>go(i-1)} aria-label="Previous"><img src={`${DS}/chevron.svg`} alt=""/></button>
        <button className="gallery__arrow gallery__arrow--next" onClick={()=>go(i+1)} aria-label="Next"><img src={`${DS}/chevron.svg`} alt=""/></button>
        <div className="gallery__thumbs">
          {slides.map(({src}, idx) => (
            <button key={src} className={"gallery__thumb" + (i===idx?" is-active":"")} onClick={()=>go(idx)}>
              <img src={src} alt=""/>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

    {label:"Full ingredient list", content:<p>Devadaru (<em>Cedrus deodara</em>), Nandivriksha (<em>Tabernaemontana divaricata</em>), Rasna (<em>Alpinia galanga</em>), Sesame oil (<em>Sesamum indicum</em>) base, Eucalyptus oil, Lemongrass oil, Peppermint essential oil. No synthetic fragrance. No mineral oil. No parabens.</p>},
    {label:"When not to use", content:<p>Not to be applied directly on open wounds or broken skin. Not to be taken internally. If rigorous exercise is immediately planned, allow 10-15 minutes after application. Avoid cold showers or cold beverages immediately post-application — they work against the oil's warming action.</p>},
    {label:"The Ayurvedic science — why oil, why these herbs", content:<p>In Ayurveda, pain (Ruja) is the classical expression of aggravated Vata dosha. External injury — Aghata — disturbs Vata in the Asthi (bone) and Mamsa (muscle) tissues, triggering a tridoshic response: heat and redness from aggravated Pitta, swelling from aggravated Kapha, pain and stiffness from Vata. The classical first-line treatment for this presentation is Bahya Snehan — external application of a lipid-based formulation to the affected tissue. Sesame oil is the classical base for Vata-predominant musculoskeletal conditions. Devadaru and Nandivriksha help balance the vitiated Vata and Pitta. Rasna addresses Adhyavata — the Vata governing the lower joints and extremities. Lemongrass and eucalyptus support the Kapha component. The treatment goal is Tridosha balance — restoring the body's natural equilibrium, not suppressing its natural healing response.</p>},
  ];
  const [open, setOpen] = useState([0]);
  const toggle = (idx) => setOpen(open.includes(idx) ? open.filter(i=>i!==idx) : [...open, idx]);
  return (
    <section className="go-deeper">
      <div className="eyebrow eyebrow--cinnamon">Information</div>
      <h2 className="go-deeper__title">Go deeper.</h2>
      <div className="accordion">
        {items.map(({label, content}, idx)=>(
          <div className={"accordion__item" + (open.includes(idx)?" is-open":"")} key={label}>
            <button className="accordion__btn" onClick={()=>toggle(idx)}>
              <span className="accordion__label">{label}</span>
              <img className="accordion__chev" src={`${DS}/chevron.svg`} alt=""/>
            </button>
            <div className="accordion__panel">
              <div className="accordion__content">{content}</div>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

function StickyBar({ size, onAdd, added }) {
  const priceData = {
    "200": { new: "₹437", old: "₹460", sub: "200 ml · ₹437" },
    "60":  { new: "₹150", old: null,   sub: "60 ml · ₹150" }
  };
  const p = priceData[size];
  return (
    <div className="sticky-bar">
      <div className="sticky-bar__inner">
        <div className="sticky-bar__thumb"><img src={`${DS}/hero-1.webp`} alt=""/></div>
        <div className="sticky-bar__info">
          <div className="sticky-bar__title">Myaxyl Oil</div>
          <div className="sticky-bar__sub">{p.sub}</div>
        </div>
        <button className={"atc sticky-bar__atc"+(added?" is-added":"")} onClick={onAdd}>
          <span className="atc__icon"><img src={`${DS}/i-bag.svg`} alt=""/></span>
          <span className="atc__main">
            <span className="atc__main-top">{added ? "✓ Added to Cart" : "Add to Cart"}</span>
          </span>
          <span className="atc__price">
            {p.old && <span className="atc__price-old">{p.old}</span>}
            <span className="atc__price-new">{p.new}</span>
          </span>
        </button>
      </div>
    </div>
  );
}
