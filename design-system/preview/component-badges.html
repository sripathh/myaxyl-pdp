<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;font-family:var(--sans);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.pill{display:inline-flex;align-items:center;background:rgba(30,75,60,0.05);border:1px solid rgba(30,75,60,0.2);color:#1E4B3C;font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:6px 14px;border-radius:999px;}
.pill::before{content:"•";margin-right:6px;}
.solid{display:inline-flex;align-items:center;background:#1E4B3C;color:#FEF9E7;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:6px 10px;border-radius:999px;}
.tag{display:inline-flex;align-items:center;gap:4px;background:#15803D;color:#fff;border:1px solid rgba(255,255,255,0.1);border-radius:3px;padding:4px 8px;font-size:12px;font-weight:800;text-transform:uppercase;}
.verified{display:inline-flex;align-items:center;gap:4px;color:rgba(25,29,24,0.4);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.verified::before{content:"✓";font-weight:900;color:#1E4B3C;}
.role{display:inline-flex;padding:3px 8px;font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;border-radius:4px;}
</style></head>
<body>
<span class="pill">Hair Fall · Hair Growth</span>
<span class="solid">Best Seller</span>
<span class="tag">↑ Growth · Month 3</span>
<span class="verified">Verified Purchase</span>
<span class="role" style="background:rgba(34,197,94,0.2);color:#16a34a;">Growth</span>
<span class="role" style="background:rgba(59,130,246,0.2);color:#2563eb;">Recovery</span>
<span class="role" style="background:rgba(245,158,11,0.2);color:#d97706;">Strength</span>
<span class="role" style="background:rgba(232,193,122,0.25);color:#b8860b;">Nourish</span>
</body></html>
