<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#F9F8F3;font-family:var(--sans);}
.card{display:grid;grid-template-columns:1fr 1px 1fr;gap:0;max-width:600px;background:#fff;border:1px solid rgba(192,200,195,0.25);border-radius:12px;overflow:hidden;}
.col{padding:18px 14px;}
.us{background:#2A4A3D;color:#FEF9E7;border-radius:12px;}
.them{background:#F9F8F3;color:rgba(25,29,24,0.8);}
.hdr{font-family:var(--serif);font-size:16px;margin-bottom:14px;}
.row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.15);}
.them .row{border-bottom:1px solid rgba(192,200,195,0.25);}
.row:last-child{border:none;}
.lbl{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.5;margin-bottom:4px;}
.val{font-size:12px;line-height:1.4;}
</style></head>
<body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:600px;">
  <div class="col us">
    <div class="hdr">Neelibhringadi Keram</div>
    <div class="row"><div class="lbl">Processing</div><div class="val">11-day classical extraction</div></div>
    <div class="row"><div class="lbl">Side effects</div><div class="val">None reported</div></div>
  </div>
  <div class="col them">
    <div class="hdr" style="color:#191D18;">Generic Hair Oil</div>
    <div class="row"><div class="lbl">Processing</div><div class="val">Machine-mixed, same day</div></div>
    <div class="row"><div class="lbl">Side effects</div><div class="val">Pore-clogging, buildup</div></div>
  </div>
</div>
</body></html>
