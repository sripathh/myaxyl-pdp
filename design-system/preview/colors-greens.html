<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--cream-bg);font-family:var(--sans);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.swatch{aspect-ratio:1.2/1;border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border-soft);}
.hex{font-family:var(--sans);font-size:11px;font-weight:800;letter-spacing:0.8px;text-transform:uppercase;}
.name{font-family:var(--serif);font-size:14px;line-height:1.1;}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#1E4B3C;color:#FEF9E7;"><div class="name">Green</div><div class="hex">#1E4B3C</div></div>
  <div class="swatch" style="background:#2A4A3D;color:#FEF9E7;"><div class="name">Honest Green</div><div class="hex">#2A4A3D</div></div>
  <div class="swatch" style="background:#364837;color:#FEF9E7;"><div class="name">Stats Green</div><div class="hex">#364837</div></div>
  <div class="swatch" style="background:#435a45;color:#FEF9E7;"><div class="name">Gallery Green</div><div class="hex">#435a45</div></div>
</div>
</body></html>
