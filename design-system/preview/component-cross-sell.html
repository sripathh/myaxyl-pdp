<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#864E3A;font-family:var(--sans);}
.cross{display:flex;align-items:center;gap:12px;background:#864E3A;color:#fff;padding:12px 14px;border-radius:12px;max-width:440px;}
.img{width:56px;height:56px;border-radius:10px;overflow:hidden;border:1px solid #FBBF24;background:#fff;flex:0 0 auto;}
.img img{width:100%;height:100%;object-fit:cover;}
.info{flex:1;min-width:0;}
.title{font-size:14px;font-weight:800;line-height:1.1;}
.desc{font-size:11px;color:rgba(255,255,255,0.65);margin-top:3px;line-height:1.3;}
.add{background:#FBBF24;color:#191D18;font-weight:900;font-size:13px;padding:8px 10px;border-radius:8px;white-space:nowrap;border:none;}
</style></head>
<body>
<div class="cross">
  <div class="img"><img src="../assets/cross-sell.webp"></div>
  <div class="info"><div class="title">Bhringarajasava</div><div class="desc">Pair for the full recovery system</div></div>
  <button class="add">+ ₹225</button>
</div>
</body></html>
